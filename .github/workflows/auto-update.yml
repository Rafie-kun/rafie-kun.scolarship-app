name: Dynamic Scribe Database Auto-Update

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly (Sunday at midnight)
  workflow_dispatch: # On manual trigger

permissions:
  contents: write

jobs:
  auto-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Project Dependencies
        run: npm ci || npm install

      - name: Run Scribe Database Auto-Updater Script
        run: node scripts/updateData.js

      - name: Run Live Exchange Rates Updates Script
        run: node scripts/updateExchangeRates.js

      - name: Check for Database Modifications
        id: git-check
        run: |
          git config user.name "ScholarPath Bot"
          git config user.email "bot@scholarpath.org"
          git add public/data/
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit & Push Verified Database Updates
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git commit -m "chore(data): automated weekly database refresh and exchange rate sync [skip ci]"
          git push origin main
