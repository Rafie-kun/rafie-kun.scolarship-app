name: Weekly ScholarPath Intelligence Update

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays at midnight UTC
  workflow_dispatch: # Enable manual run via GitHub Actions dashboard

jobs:
  update-scholarpath-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js Runtime Environment
        uses: actions/setup-node@v3
        with:
          node-size: '18'
          cache: 'npm'

      - name: Install Base Project Dependencies
        run: npm ci --ignore-scripts || npm install

      - name: Execute Smart Database Expansion & Merging Script
        run: node scripts/updateData.cjs

      - name: Commit & Push Consolidated Updates
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add public/data/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore(data): auto-update global countries, cost of living, and jobs datasets"
            git push origin main
          else
            echo "No changes detected. Database is fully up-to-date."
          fi
